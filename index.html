<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion des Trains</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-4"
  >
    <div
      class="w-full bg-white rounded-2xl shadow-2xl border border-gray-200 overflow-hidden"
    >
      <div
        class="bg-gradient-to-b from-gray-100 to-white p-6 border-b border-gray-200"
      >
        <h2
          class="text-4xl font-semibold text-center text-gray-800 tracking-tight"
        >
          🚆 Gestion des Trains
        </h2>
      </div>

      <div class="p-8 space-y-8">
        <!-- Train Table -->
        <div
          class="bg-gray-50 rounded-xl border border-gray-200 overflow-hidden"
        >
          <table class="w-full">
            <thead>
              <tr class="bg-gray-100 border-b border-gray-200">
                <th class="p-4 text-left text-gray-600 font-medium">ID</th>
                <th class="p-4 text-left text-gray-600 font-medium">
                  Nom du Train
                </th>
                <th class="p-4 text-left text-gray-600 font-medium">
                  Réparations
                </th>
                <th class="p-4 text-left text-gray-600 font-medium">Action</th>
              </tr>
            </thead>
            <tbody id="train-table-body" class="divide-y divide-gray-200">
              <!-- Trains will be inserted here dynamically -->
            </tbody>
          </table>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
          <!-- Add Train Form -->
          <div
            class="bg-white rounded-2xl border border-gray-200 shadow-lg p-6"
          >
            <h3 class="text-2xl font-semibold mb-6 text-center text-gray-800">
              Ajouter un Train
            </h3>
            <form id="add-train-form" class="space-y-6">
              <div>
                <label
                  for="train_name"
                  class="block text-sm font-medium text-gray-700 mb-2"
                >
                  Nom du Train
                </label>
                <input
                  type="text"
                  id="train_name"
                  required
                  class="w-full px-4 py-3 bg-gray-100 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                />
              </div>
              <button
                type="submit"
                class="w-full bg-blue-500 text-white py-3 rounded-xl hover:bg-blue-600 transition duration-300 font-semibold"
              >
                Ajouter
              </button>
            </form>
          </div>

          <!-- Add Repair Form -->
          <div
            class="bg-white rounded-2xl border border-gray-200 shadow-lg p-6"
          >
            <h3 class="text-2xl font-semibold mb-6 text-center text-gray-800">
              Ajouter une Réparation
            </h3>
            <form id="add-repair-form" class="space-y-6">
              <div>
                <label
                  for="train_id"
                  class="block text-sm font-medium text-gray-700 mb-2"
                >
                  Train
                </label>
                <select
                  id="train_id"
                  required
                  class="w-full px-4 py-3 bg-gray-100 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 transition"
                >
                  <!-- Options will be generated dynamically -->
                </select>
              </div>
              <div>
                <label
                  for="repair_type"
                  class="block text-sm font-medium text-gray-700 mb-2"
                >
                  Type de Réparation
                </label>
                <select
                  id="repair_type"
                  required
                  class="w-full px-4 py-3 bg-gray-100 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 transition"
                >
                  <option value="">Sélectionner un type de réparation</option>
                </select>
              </div>
              <button
                type="submit"
                class="w-full bg-green-500 text-white py-3 rounded-xl hover:bg-green-600 transition duration-300 font-semibold"
              >
                Ajouter
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
