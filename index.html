<!DOCTYPE html>
<html lang="fr" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion des Trains</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="min-h-screen flex flex-col items-center"
  >
    <div class="w-full bg-white p-8">
      <h2 class="text-3xl font-extrabold mb-6 text-gray-800 text-center">
        🚆 Gestion des Trains et Réparations
      </h2>

      <!-- Tableau des Trains -->
      <div class="overflow-x-auto mb-8">
        <table class="w-full border-collapse bg-white">
          <thead>
            <tr class="bg-black text-white">
              <th class="border p-3 text-left">ID</th>
              <th class="border p-3 text-left">Nom du Train</th>
              <th class="border p-3 text-left">Réparations</th>
              <th class="border p-3 text-left">Action</th>
            </tr>
          </thead>
          <tbody id="train-table-body" class="divide-y bg-gray-100">
            <!-- Les trains seront insérés ici via JavaScript -->
          </tbody>
        </table>
      </div>

      <div class="grid md:grid-cols-2 gap-8">
        <!-- Formulaire Ajout Train -->
        <div class="bg-white p-6 border border-gray-200">
          <h2 class="text-xl font-semibold mb-4 text-gray-700 text-center">
            Ajouter un Train
          </h2>
          <form id="add-train-form" class="space-y-4">
            <div>
              <label
                for="train_name"
                class="block text-sm font-medium text-gray-700 mb-2"
              >
                Nom du Train :
              </label>
              <input
                type="text"
                id="train_name"
                required
                class="w-full px-4 py-2 border border-gray-300 focus:ring-2 focus:ring-blue-500"
              />
            </div>
            <button
              type="submit"
              class="w-full bg-blue-500 text-white py-2 hover:bg-blue-700 transition duration-300"
            >
              Ajouter
            </button>
          </form>
        </div>

        <!-- Formulaire Ajout Réparation -->
        <div class="bg-white p-6 border border-gray-200">
          <h2 class="text-xl font-semibold mb-4 text-gray-700 text-center">
            Ajouter une Réparation
          </h2>
          <form id="add-repair-form" class="space-y-4">
            <div>
              <label
                for="train_id"
                class="block text-sm font-medium text-gray-700 mb-2"
              >
                Train :
              </label>
              <select
                id="train_id"
                required
                class="w-full px-4 py-2 border border-gray-300 focus:ring-2 focus:ring-blue-500"
              >
                <!-- Options générées dynamiquement -->
              </select>
            </div>
            <div>
              <label
                for="repair_type"
                class="block text-sm font-medium text-gray-700 mb-2"
              >
                Type de Réparation :
              </label>
              <input
                type="text"
                id="repair_type"
                required
                class="w-full px-4 py-2 border border-gray-300 focus:ring-2 focus:ring-blue-500"
              />
            </div>
            <button
              type="submit"
              class="w-full bg-green-500 text-white py-2 hover:bg-green-700 transition duration-300"
            >
              Ajouter
            </button>
          </form>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
